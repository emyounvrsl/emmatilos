<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghibli Movies Poster Gallery</title>
  <style>
    body {
      background-color: lightgray;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    header h1 {
      font-family: Georgia, serif;
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    header h3 {
      font-family: Arial, sans-serif;
      font-size: 1em;
      color: #666;
      margin-top: 0;
    }
    .gallery-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .large-image-container {
      flex: 1 1 600px;
      max-width: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    .large-image-container img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      transition: opacity 0.3s ease;
    }
    .thumbs-container {
      flex: 1 1 250px;
      max-width: 250px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }
    .thumbs-container img {
      width: 100%;
      height: auto;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .thumbs-container img:hover {
      transform: scale(1.05);
    }
    .back-btn {
      display: block;
      text-align: center;
      margin: 30px auto;
      background-color: #333;
      color: #fff;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
      width: fit-content;
    }
    .back-btn:hover {
      background-color: #555;
    }
    @media (max-width: 768px) {
      .gallery-container {
        flex-direction: column;
        align-items: center;
      }
      .thumbs-container {
        max-width: 100%;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ghibli Movies Poster Gallery</h1>
    <h3>made by Emma Tilos</h3>
  </header>
  <div class="gallery-container">
    <div class="large-image-container">
      <img id="largeImage" src="totoro.jpg" alt="Large View">
    </div>
    <div class="thumbs-container">
      <img src="totoro.jpg" alt="My Neighbor Totoro" onclick="showImage(this)">
      <img src="away.jpg" alt="Spirited Away" onclick="showImage(this)">
      <img src="princessm.jpg" alt="Princess Mononoke" onclick="showImage(this)">
      <img src="howl.jpg" alt="Howl's Moving Castle" onclick="showImage(this)">
      <img src="ponyo.jpg" alt="Ponyo" onclick="showImage(this)">
      <img src="kiki.jpg" alt="Kiki's Delivery Service" onclick="showImage(this)">
      <img src="cat.jpg" alt="The Cat Returns" onclick="showImage(this)">
      <img src="fireflies.jpg" alt="Grave of the Fireflies" onclick="showImage(this)">
      <img src="wind.jpg" alt="The Wind Rises" onclick="showImage(this)">
      <img src="marie.jpg" alt="When Marnie Was There" onclick="showImage(this)">
      <img src="poppy.jpg" alt="From Up on Poppy Hill" onclick="showImage(this)">
      <img src="secret.jpg" alt="The Secret World of Arrietty" onclick="showImage(this)">
    </div>
  </div>
  <a href="index.html" class="back-btn">Back to Portfolio</a>
  <script>
    function showImage(img) {
      document.getElementById('largeImage').src = img.src;
    }
  </script>
</body>
</html>
