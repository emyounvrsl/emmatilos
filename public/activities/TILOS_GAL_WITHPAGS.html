<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emma's Gallery of Moments</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #2d6a4f;
      --primary-light: #40916c;
      --accent: #52b788;
      --bg: #f8f9fa;
      --text: #2d3436;
      --card: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      text-align: center;
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      padding: 3rem 1rem;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.2rem;
      opacity: 0.95;
      font-style: italic;
    }

    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.8rem;
    }

    .gallery-item {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .gallery-item:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .gallery-item img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    .gallery-item figcaption {
      padding: 1rem;
      font-weight: 500;
      color: var(--primary);
    }

    .btn {
      display: inline-block;
      margin: 2rem auto;
      padding: 12px 28px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover {
      background: var(--accent);
      transform: translateY(-3px);
    }

    /* Lightbox */
    .lightbox-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }

    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 85%;
      background: #000;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .lightbox-content img {
      width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      object-fit: contain;
    }

    .lightbox-caption {
      color: white;
      margin-top: 12px;
      font-size: 1.1rem;
      text-align: center;
    }

    .lightbox-close {
      position: absolute;
      top: -15px;
      right: -15px;
      background-color: white;
      color: #333;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0,0,0,0.6);
      color: white;
      border: none;
      font-size: 28px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-prev { left: -25px; }
    .lightbox-next { right: -25px; }

    .lightbox-view {
      display: block;
      margin: 15px auto 0;
      padding: 10px 20px;
      background-color: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      width: fit-content;
      font-weight: 600;
    }

    .lightbox-view:hover {
      background-color: var(--accent);
    }

    /* Scroll Button */
    #scrollTopBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      display: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 100;
    }

    /* Dark Mode */
    .dark-mode {
      --bg: #1a1a1a;
      --text: #e0e0e0;
      --card: #252525;
      --primary: #52b788;
    }

    .dark-mode header {
      background: linear-gradient(135deg, #1f2a24, #2d6a4f);
    }
  </style>
</head>

<!-- Lightbox -->
<div class="lightbox-modal" id="lightboxModal">
  <div class="lightbox-content">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <a href="#" class="lightbox-view" id="lightboxView">View Full Details</a>
  </div>
</div>

<button id="scrollTopBtn">↑</button>

<script>
  const galleryLinks = document.querySelectorAll('.gallery a');
  const lightboxModal = document.getElementById('lightboxModal');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCaption = document.getElementById('lightboxCaption');
  const lightboxClose = document.getElementById('lightboxClose');
  const lightboxPrev = document.getElementById('lightboxPrev');
  const lightboxNext = document.getElementById('lightboxNext');
  const lightboxView = document.getElementById('lightboxView');

  let currentIndex = 0;

  const galleryItems = Array.from(galleryLinks).map(link => ({
    href: link.getAttribute('href'),
    src: link.querySelector('img').getAttribute('src'),
    alt: link.querySelector('img').getAttribute('alt')
  }));

  function openLightbox(index) {
    currentIndex = index;
    lightboxImg.src = galleryItems[index].src;
    lightboxCaption.textContent = galleryItems[index].alt;
    lightboxView.href = galleryItems[index].href;
    lightboxModal.style.display = 'flex';
  }

  galleryLinks.forEach((link, index) => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      openLightbox(index);
    });
  });

  lightboxClose.addEventListener('click', () => lightboxModal.style.display = 'none');
  lightboxPrev.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
    openLightbox(currentIndex);
  });
  lightboxNext.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % galleryItems.length;
    openLightbox(currentIndex);
  });

  window.addEventListener('click', function(e) {
    if (e.target === lightboxModal) lightboxModal.style.display = 'none';
  });

  // Scroll to Top
  const scrollBtn = document.getElementById('scrollTopBtn');
  window.addEventListener('scroll', () => {
    scrollBtn.style.display = window.scrollY > 400 ? 'block' : 'none';
  });
  scrollBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Theme Toggle (consistent with other pages)
  const themeToggle = document.createElement('button');
  themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
  themeToggle.style.position = 'fixed';
  themeToggle.style.top = '20px';
  themeToggle.style.right = '20px';
  themeToggle.style.background = 'rgba(255,255,255,0.2)';
  themeToggle.style.color = 'white';
  themeToggle.style.border = 'none';
  themeToggle.style.padding = '10px';
  themeToggle.style.borderRadius = '50%';
  themeToggle.style.cursor = 'pointer';
  themeToggle.style.zIndex = '200';
  document.body.appendChild(themeToggle);

  themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    themeToggle.innerHTML = document.body.classList.contains('dark-mode') 
      ? '<i class="fas fa-sun"></i>' 
      : '<i class="fas fa-moon"></i>';
  });
</script>
